services:

  # ── FastAPI interpretation portal ─────────────────────────────
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      BOOTH_ACCESS_TOKEN: "${BOOTH_ACCESS_TOKEN:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      JWT_EXPIRY_SECONDS: "${JWT_EXPIRY_SECONDS:-86400}"
      DEFAULT_JITSI_ROOM: "${DEFAULT_JITSI_ROOM:-https://meet.jit.si/eventyay-stage-room}"
      JITSI_DOMAIN: "${JITSI_DOMAIN:-meet.jit.si}"
      MEDIAMTX_WHIP_BASE: "http://mediamtx:8889"
      MEDIAMTX_HLS_BASE: "http://mediamtx:8888"
    depends_on:
      - mediamtx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MediaMTX audio server ─────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:1
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8888:8888"    # HLS output
      - "8889:8889"    # WHIP (WebRTC HTTP ingest)
      - "8189:8189/udp" # WebRTC ICE/UDP mux
    restart: unless-stopped
